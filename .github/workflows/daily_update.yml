name: Daily YouTube Time Series Update

on:
  schedule:
    - cron: "10 16 * * *"  # runs every day at 00:00 UTC
  workflow_dispatch:      # allows manual run

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run your script
      - name: Run time series collection script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python time_series_collection_optimized.py

      # 5. Commit and push updated CSV
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add video_metadata_time_series.csv

          git diff --staged --quiet || git commit -m "Daily CSV update [skip ci]"

          git push
