name: Daily YouTube Time Series Update

on:
  schedule:
    - cron: "10 16 * * *"  # runs every day at 00:10 SGT
  workflow_dispatch:      # allows manual run

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Create Backup
      - name: Create database backup (SGT)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(TZ=Asia/Singapore date +%Y-%m-%d)
          pg_dump "$DATABASE_URL" | gzip > backup-$DATE.sql.gz

      # 5. Upload Backup (Private Artifact)
      - name: Upload database backup
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_number }}
          path: backup-*.sql.gz
          retention-days: 30

      # 6. Run script
      - name: Run time series collection script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          python -m logic.time_series_collection_supabase
