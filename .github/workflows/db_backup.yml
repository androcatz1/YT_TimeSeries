name: database backup

on:
  schedule:
    - cron: "10 16 * * *"  # runs every day at 00:10 SGT
  workflow_dispatch:      # allows manual run

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. Create Backup
      - name: Create database backup (SGT)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
            bash database/backup.sh

      # 2. Upload Backup (Private Artifact)
      - name: Upload database backup
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_number }}
          path: backup-*.sql.gz
          retention-days: 30